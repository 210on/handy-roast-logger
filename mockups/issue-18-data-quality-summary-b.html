<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Issue #18 Mock B - Collapsible Quality Drawer</title>
<style>
    :root {
        --bg: #f5efe5;
        --panel: #fffaf2;
        --ink: #25170f;
        --muted: #776354;
        --line: rgba(91, 60, 39, 0.16);
        --accent: #d96c2c;
        --danger: #b43a32;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
            linear-gradient(120deg, rgba(217, 108, 44, 0.12), transparent 40%),
            linear-gradient(180deg, #fffbf4, var(--bg));
        color: var(--ink);
        font-family: ui-rounded, "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
    }
    main {
        width: min(420px, calc(100vw - 28px));
        padding: 18px;
        border-radius: 30px;
        background: rgba(255, 250, 242, 0.9);
        box-shadow: 0 20px 60px rgba(50, 31, 18, 0.15);
    }
    .timer {
        font-size: 64px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: -0.08em;
        text-align: center;
        margin: 12px 0 18px;
    }
    .chart {
        height: 180px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background:
            repeating-linear-gradient(0deg, transparent, transparent 35px, rgba(91, 60, 39, 0.07) 36px),
            repeating-linear-gradient(90deg, transparent, transparent 61px, rgba(91, 60, 39, 0.07) 62px),
            #fffaf4;
        position: relative;
        overflow: hidden;
    }
    .chart::before {
        content: "";
        position: absolute;
        left: 24px;
        right: 24px;
        bottom: 38px;
        height: 90px;
        border-top: 5px solid #e76f51;
        border-radius: 80% 20% 0 0;
        transform: rotate(-7deg);
    }
    .post {
        margin-top: 14px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
    }
    .post-top {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
    }
    .label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }
    .loss {
        font-size: 34px;
        line-height: 1;
        font-weight: 900;
    }
    .weights {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
    }
    details {
        margin-top: 12px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
    }
    summary {
        list-style: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-weight: 900;
    }
    summary::-webkit-details-marker { display: none; }
    .badge {
        border-radius: 999px;
        padding: 6px 10px;
        background: rgba(217, 108, 44, 0.12);
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
    }
    .metrics {
        display: grid;
        gap: 8px;
        margin-top: 12px;
    }
    .metric {
        display: grid;
        grid-template-columns: 92px 1fr 44px;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
        font-weight: 800;
    }
    .bar {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(91, 60, 39, 0.10);
    }
    .bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
    }
    .metric.danger .bar span { background: var(--danger); }
    .note {
        margin-top: 10px;
        padding: 10px;
        border-radius: 14px;
        background: #fff;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.55;
    }
    .action {
        width: 100%;
        margin-top: 14px;
        border: 0;
        border-radius: 999px;
        padding: 18px;
        background: #25170f;
        color: #fffaf2;
        font-size: 18px;
        font-weight: 900;
    }
</style>
</head>
<body>
<main>
    <div class="timer">10:12</div>
    <div class="chart" aria-label="roast chart mock"></div>
    <section class="post" aria-label="post roast summary">
        <div class="post-top">
            <div>
                <div class="label">Weight Loss</div>
                <div class="weights">65.0g to 56.7g / -8.3g</div>
            </div>
            <div class="loss">12.8%</div>
        </div>
        <details open>
            <summary>
                <span>Data quality</span>
                <span class="badge">tap to hide</span>
            </summary>
            <div class="metrics">
                <div class="metric">
                    <span>Captured</span>
                    <div class="bar"><span style="width: 86%"></span></div>
                    <b>55</b>
                </div>
                <div class="metric">
                    <span>Interpolated</span>
                    <div class="bar"><span style="width: 18%"></span></div>
                    <b>4</b>
                </div>
                <div class="metric danger">
                    <span>Missed</span>
                    <div class="bar"><span style="width: 9%"></span></div>
                    <b>2</b>
                </div>
                <div class="metric danger">
                    <span>Ignored</span>
                    <div class="bar"><span style="width: 14%"></span></div>
                    <b>3</b>
                </div>
            </div>
            <div class="note">
                CSVには同じ集計値と各行の data_source が入ります。普段は閉じておけるので、通常の焙煎フローは重くしません。
            </div>
        </details>
    </section>
    <button class="action">SAVE CSV</button>
</main>
</body>
</html>
