<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Issue #20 Mock B - Bottom Recovery Card</title>
<style>
    :root {
        --bg: #f7f2ea;
        --card: #fffaf2;
        --ink: #29180f;
        --muted: #7d6759;
        --warn: #bc6c25;
        --line: rgba(91, 60, 39, 0.14);
        --red: #d64d3b;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
            radial-gradient(circle at 24% 12%, rgba(188, 108, 37, 0.18), transparent 30%),
            linear-gradient(160deg, #fff9ef, var(--bg));
        color: var(--ink);
        font-family: ui-rounded, "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
    }
    main {
        position: relative;
        width: min(420px, calc(100vw - 28px));
        min-height: 680px;
        padding: 18px;
        border-radius: 30px;
        background: rgba(255, 250, 242, 0.9);
        box-shadow: 0 20px 60px rgba(50, 31, 18, 0.14);
        overflow: hidden;
    }
    .timer {
        margin-top: 18px;
        text-align: center;
        font-size: 68px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: -0.08em;
    }
    .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin: 18px 0 14px;
    }
    .stat {
        padding: 12px;
        border-radius: 18px;
        background: #fff;
        text-align: center;
    }
    .label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }
    .value {
        display: block;
        margin-top: 4px;
        font-size: 24px;
        font-weight: 900;
    }
    .chart {
        height: 250px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background:
            repeating-linear-gradient(0deg, transparent, transparent 46px, rgba(91, 60, 39, 0.07) 47px),
            repeating-linear-gradient(90deg, transparent, transparent 66px, rgba(91, 60, 39, 0.07) 67px),
            #fffaf4;
        position: relative;
    }
    .chart::before {
        content: "";
        position: absolute;
        left: 28px;
        right: 28px;
        bottom: 58px;
        height: 120px;
        border-top: 5px solid var(--red);
        border-radius: 90% 20% 0 0;
        transform: rotate(-8deg);
    }
    .bottom-stack {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 18px;
        display: grid;
        gap: 10px;
    }
    .recovery {
        padding: 12px;
        border: 1px solid rgba(188, 108, 37, 0.22);
        border-radius: 20px;
        background: rgba(255, 247, 231, 0.96);
        box-shadow: 0 10px 30px rgba(91, 60, 39, 0.12);
    }
    .recovery-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-weight: 900;
    }
    .badge {
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(188, 108, 37, 0.16);
        color: var(--warn);
        font-size: 12px;
        font-weight: 900;
    }
    .recovery p {
        margin: 6px 0 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.45;
    }
    .recovery-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }
    .recovery-actions button {
        border: 0;
        border-radius: 999px;
        padding: 10px;
        font-weight: 900;
    }
    .primary {
        background: var(--ink);
        color: #fffaf2;
    }
    .secondary {
        background: #fff;
        color: var(--ink);
    }
    .action {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 30px rgba(50, 31, 18, 0.12);
    }
    .round {
        width: 64px;
        height: 64px;
        border: 0;
        border-radius: 50%;
        background: var(--red);
        color: #fff;
        font-weight: 900;
    }
    .hint {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
    }
</style>
</head>
<body>
<main>
    <div class="timer">07:42</div>
    <div class="stats">
        <div class="stat"><span class="label">Temp</span><span class="value">194</span></div>
        <div class="stat"><span class="label">RoR</span><span class="value">8.4</span></div>
        <div class="stat"><span class="label">Missed</span><span class="value">2</span></div>
    </div>
    <div class="chart" aria-label="roast chart mock"></div>
    <div class="bottom-stack">
        <section class="recovery" aria-label="resume recovery">
            <div class="recovery-head">
                <span>復帰チェック</span>
                <span class="badge">25秒停止</span>
            </div>
            <p>音とマイクを再準備しました。欠損した可能性のある slot は CSV で missed として残します。</p>
            <div class="recovery-actions">
                <button class="primary">Test Cue</button>
                <button class="secondary">Dismiss</button>
            </div>
        </section>
        <div class="action">
            <button class="round">STOP</button>
            <div class="hint">焙煎は継続中。必要なら Test Cue だけ押す。</div>
        </div>
    </div>
</main>
</body>
</html>
