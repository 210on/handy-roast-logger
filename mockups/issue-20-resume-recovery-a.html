<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Issue #20 Mock A - Top Resume Toast</title>
<style>
    :root {
        --bg: #f7f2ea;
        --card: #fffaf2;
        --ink: #29180f;
        --muted: #7d6759;
        --warn: #bc6c25;
        --line: rgba(91, 60, 39, 0.14);
        --red: #d64d3b;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #fff9ef, var(--bg));
        color: var(--ink);
        font-family: ui-rounded, "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
    }
    main {
        position: relative;
        width: min(420px, calc(100vw - 28px));
        min-height: 680px;
        padding: 18px;
        border-radius: 30px;
        background: rgba(255, 250, 242, 0.9);
        box-shadow: 0 20px 60px rgba(50, 31, 18, 0.14);
        overflow: hidden;
    }
    .toast {
        position: absolute;
        top: 14px;
        left: 14px;
        right: 14px;
        z-index: 3;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 12px;
        border: 1px solid rgba(188, 108, 37, 0.22);
        border-radius: 18px;
        background: rgba(255, 247, 231, 0.96);
        box-shadow: 0 10px 30px rgba(91, 60, 39, 0.14);
        backdrop-filter: blur(12px);
    }
    .icon {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: rgba(188, 108, 37, 0.16);
        color: var(--warn);
        font-weight: 900;
    }
    .toast b {
        display: block;
        font-size: 14px;
    }
    .toast span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.4;
    }
    .toast button {
        border: 0;
        border-radius: 999px;
        padding: 8px 10px;
        background: var(--ink);
        color: #fffaf2;
        font-size: 12px;
        font-weight: 900;
    }
    .timer {
        margin-top: 74px;
        text-align: center;
        font-size: 68px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: -0.08em;
    }
    .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin: 18px 0 14px;
    }
    .stat {
        padding: 12px;
        border-radius: 18px;
        background: #fff;
        text-align: center;
    }
    .label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }
    .value {
        display: block;
        margin-top: 4px;
        font-size: 24px;
        font-weight: 900;
    }
    .chart {
        height: 230px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background:
            repeating-linear-gradient(0deg, transparent, transparent 42px, rgba(91, 60, 39, 0.07) 43px),
            repeating-linear-gradient(90deg, transparent, transparent 66px, rgba(91, 60, 39, 0.07) 67px),
            #fffaf4;
        position: relative;
    }
    .chart::before {
        content: "";
        position: absolute;
        left: 28px;
        right: 28px;
        bottom: 54px;
        height: 116px;
        border-top: 5px solid var(--red);
        border-radius: 90% 20% 0 0;
        transform: rotate(-8deg);
    }
    .action {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 30px rgba(50, 31, 18, 0.12);
    }
    .round {
        width: 64px;
        height: 64px;
        border: 0;
        border-radius: 50%;
        background: var(--red);
        color: #fff;
        font-weight: 900;
    }
    .hint {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
    }
</style>
</head>
<body>
<main>
    <aside class="toast" aria-label="resume warning">
        <div class="icon">!</div>
        <div>
            <b>復帰しました</b>
            <span>約25秒停止。2 slot 欠損の可能性があります。音とマイクを再準備しました。</span>
        </div>
        <button>OK</button>
    </aside>
    <div class="timer">07:42</div>
    <div class="stats">
        <div class="stat"><span class="label">Temp</span><span class="value">194</span></div>
        <div class="stat"><span class="label">RoR</span><span class="value">8.4</span></div>
        <div class="stat"><span class="label">Missed</span><span class="value">2</span></div>
    </div>
    <div class="chart" aria-label="roast chart mock"></div>
    <div class="action">
        <button class="round">STOP</button>
        <div class="hint">焙煎は継続中。次のビープで通常記録に戻ります。</div>
    </div>
</main>
</body>
</html>
